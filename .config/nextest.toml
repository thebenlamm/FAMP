[profile.default]
# Local developer profile: fail fast so feedback is quick
fail-fast = true
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# CI profile: surface every failure in one run
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 3 }
failure-output = "immediate-final"

# Carry-forward TD-1 (v0.8 milestone audit). The v0.8 listen-subprocess tests
# spawn `famp listen` daemons that bind real loopback ports; running too many
# concurrently on macOS reproduces an EADDRINUSE / port-bind flake even though
# each test grabs a 0-port. Pinning max-threads = 4 for this group restores
# the green run observed in v0.8 verification (419/419 at -j 4).
[[profile.default.overrides]]
filter = "package(famp) and (test(/listen_/) or test(=conversation_restart_safety) or test(=mcp_stdio_tool_calls))"
test-group = "listen-subprocess"

[[profile.default.overrides]]
filter = "package(famp) and (test(/inspect_broker/) or test(/inspect_identities/))"
test-group = "inspect-subprocess"

[[profile.ci.overrides]]
filter = "package(famp) and (test(/listen_/) or test(=conversation_restart_safety) or test(=mcp_stdio_tool_calls))"
test-group = "listen-subprocess"

[[profile.ci.overrides]]
filter = "package(famp) and (test(/inspect_broker/) or test(/inspect_identities/))"
test-group = "inspect-subprocess"

[test-groups]
listen-subprocess = { max-threads = 4 }
inspect-subprocess = { max-threads = 1 }
