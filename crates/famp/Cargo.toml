[package]
name = "famp"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "FAMP v0.5.1 — umbrella crate and CLI"

[lints]
workspace = true

[dependencies]
famp-core = { path = "../famp-core" }
famp-canonical = { path = "../famp-canonical" }
famp-crypto = { path = "../famp-crypto" }
famp-envelope = { path = "../famp-envelope" }
famp-fsm = { path = "../famp-fsm" }
famp-transport = { path = "../famp-transport" }
famp-keyring = { path = "../famp-keyring" }
famp-transport-http = { path = "../famp-transport-http" }
tokio = { workspace = true, features = ["sync", "rt", "rt-multi-thread", "macros", "time", "process", "io-util"] }
thiserror = { workspace = true }
serde_json = { workspace = true }
ed25519-dalek = { workspace = true }
rand = { workspace = true }
url = "2"
base64 = { workspace = true }

[dev-dependencies]
# test-util feature of famp-transport is ONLY enabled in dev-dependencies so
# send_raw_for_test is unreachable from production builds (D-D6).
famp-transport = { path = "../famp-transport", features = ["test-util"] }
tokio = { workspace = true, features = ["sync", "rt", "rt-multi-thread", "macros", "time", "process", "io-util"] }
rcgen = "0.14"
tempfile = "3"
reqwest = { version = "0.13", default-features = false, features = ["rustls-no-provider"] }
axum = "0.8"

[[bin]]
name = "famp"
path = "src/bin/famp.rs"
