name: ci

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - ".planning/**"
      - "**/*.md"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "docs/**"
      - ".planning/**"
      - "**/*.md"
  # Daily advisory scan cron disabled — re-enable by restoring:
  #   schedule:
  #     - cron: "0 7 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt-check:
    name: fmt-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - name: No-OpenSSL gate (D-F4)
        run: |
          set -euo pipefail
          if cargo tree -i openssl --workspace 2>/dev/null | grep -q .; then
            echo "::error::openssl appeared in the workspace dep tree (D-F4 violated)"
            cargo tree -i openssl --workspace || true
            exit 1
          fi
          if cargo tree -i native-tls --workspace 2>/dev/null | grep -q .; then
            echo "::error::native-tls appeared in the workspace dep tree (D-F4 violated)"
            cargo tree -i native-tls --workspace || true
            exit 1
          fi
          echo "openssl + native-tls absence verified"

  test-canonical:
    name: famp-canonical RFC 8785 conformance gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest
      - name: famp-canonical conformance gate (SEED-001)
        run: just test-canonical-strict

  test-crypto:
    name: famp-crypto §7.1c worked-example + RFC 8032 gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest
      - name: famp-crypto conformance gate (§7.1c + RFC 8032)
        run: just test-crypto

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test-canonical, test-crypto]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --profile ci

  doc-test:
    name: doc-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --doc

  smoke-test:
    name: smoke-test (Quick Start install path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install famp binary from source
        run: cargo install --path crates/famp --root /tmp/famp-smoke
      - name: Verify installed binary
        run: /tmp/famp-smoke/bin/famp --version

  audit:
    name: audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
