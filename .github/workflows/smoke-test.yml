name: smoke-test

# Runs whenever the install path or its documentation changes.
# Intentionally has NO paths-ignore — README.md edits are exactly when this must fire.
on:
  push:
    branches: ["**"]
    paths:
      - "README.md"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  pull_request:
    branches: ["**"]
    paths:
      - "README.md"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: smoke-test (Quick Start install path)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Match a clean-shell user environment, not CI's deny-warnings.
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install famp binary from source
        run: cargo install --path crates/famp --root /tmp/famp-smoke
      - name: Verify install-claude-code writes all expected artifacts
        run: |
          SMOKE_HOME=$(mktemp -d)
          FAMP_INSTALL_TARGET_HOME="$SMOKE_HOME" /tmp/famp-smoke/bin/famp install-claude-code
          test -f "$SMOKE_HOME/.claude.json"
          test -d "$SMOKE_HOME/.claude/commands"
          test -f "$SMOKE_HOME/.famp/hook-runner.sh"
          test -f "$SMOKE_HOME/.claude/settings.json"
          test -f "$SMOKE_HOME/.claude/hooks/famp-await.sh"
          echo "all 5 install-claude-code artifacts verified"
